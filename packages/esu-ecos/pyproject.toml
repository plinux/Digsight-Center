[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "esu-ecos"
version = "0.1.0"
description = "ESU ECoS PC Interface helpers for model railway Python applications."
requires-python = ">=3.10"
readme = "USER_API.md"
license = "LicenseRef-Proprietary"
authors = [
  { name = "Digsight Center Contributors" }
]

[tool.setuptools.packages.find]
where = ["src"]
